services:
  ffmpeg-server:
    image: ffmpeg-server:latest
    ports:
      - "19080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./uploads:/tmp/uploads
      - ./outputs:/tmp/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
