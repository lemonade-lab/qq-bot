services:
  # MinIO 对象存储服务器
  # 用于文件存储（图片、附件等）
  minio:
    image: minio/minio:latest
    container_name: minio-bubble
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: lemonade      # MinIO 管理员用户名
      MINIO_ROOT_PASSWORD: lemonade   # MinIO 管理员密码（生产环境请修改）
    ports:
      - "19000:9000"    # MinIO 服务端口
      - "56101:56101"    # MinIO 控制台端口
    volumes:
      - ./docker-data/minio:/data     # 数据持久化
    command: server /data --console-address ":56101"  # 控制台端口
    networks:
      - bubble-oss-network

  # ImgProxy 图片代理服务器
  # 用于图片处理、缩放、优化等
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: imgproxy-bubble
    restart: unless-stopped
    expose:
      - "19001"  # 19001 代理 9000端口
    environment:
      - IMGPROXY_USE_S3=true                    # 使用 S3 兼容存储
      - AWS_ACCESS_KEY_ID=lemonade              # S3 访问密钥
      - AWS_SECRET_ACCESS_KEY=lemonade           # S3 密钥（生产环境请修改）
      - IMGPROXY_S3_ENDPOINT=http://minio-bubble:9000  # MinIO 端点
      - IMGPROXY_ALLOWED_SOURCES=s3://          # 允许的源
      - IMGPROXY_DEVELOPMENT_ERRORS_MODE=true   # 开发模式错误显示
      - IMGPROXY_KEY=                            # 签名密钥（可选）
      - IMGPROXY_SALT=                           # 签名盐值（可选）
      - IMGPROXY_S3_REGION=us-east-1            # S3 区域
      - IMGPROXY_S3_MULTI_REGION=false          # 多区域支持
      - IMGPROXY_S3_USE_DECRYPTION_CLIENT=false # 加密客户端
      - IMGPROXY_MAX_SRC_RESOLUTION=100         # 最大源分辨率（MP）
    networks:
      - bubble-oss-network
    depends_on:
      - minio  # 依赖 MinIO

networks:
  bubble-oss-network:
    driver: bridge
