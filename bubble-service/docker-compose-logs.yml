services:
  # Loki - 日志存储和查询引擎
  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "13100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml
    networks:
      - logging-network

  # Promtail - 日志收集器（收集容器日志）
  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./logs:/var/log/myapp:ro  # 你的应用日志目录
      - ./config/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - logging-network

  # Grafana - 可视化界面
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=lemonade
      - GF_SECURITY_ADMIN_PASSWORD=Qq002580
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_FEATURE_TOGGLES_ENABLE=lokiLive
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki
    networks:
      - logging-network

networks:
  logging-network:
    driver: bridge

volumes:
  loki-data:
  grafana-data: