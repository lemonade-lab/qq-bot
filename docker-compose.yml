services:
  nginx-web:
    image: nginx:alpine
    container_name: nginx-bubble-web
    volumes:
      - ./docker-nginx-web.conf:/etc/nginx/conf.d/default.conf 
      - ./dist:/usr/share/nginx/html
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bubble-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-bubble-proxy
    ports:
      - "29090:29090"
    volumes:
      - ./docker-nginx-proxy.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bubble-network

networks:
  bubble-network:
    driver: bridge