# Kubernetes API 版本定义 - policy/v1 是 PDB 的稳定版本
apiVersion: policy/v1
# 资源类型：PodDisruptionBudget - 用于保护应用在自愿中断期间保持可用性
kind: PodDisruptionBudget
# 元数据定义
metadata:
  # PDB 名称，在命名空间内唯一标识此预算策略
  name: bubble-chat-pdb
  # 所属命名空间，与对应的 Deployment 保持一致
  namespace: default
# PDB 的规格定义
spec:
  # 最小可用 Pod 数量：确保任何时候至少有指定数量的 Pod 处于运行状态
  # 注意：此值不应大于 Deployment 中设置的 replicas 数量
  # 当前配置针对 replicas=3 的情况，设置为 2 允许一个 Pod 被安全中断
  minAvailable: 2
  # Pod 选择器：定义此 PDB 保护哪些 Pod
  selector:
    matchLabels:
      # 选择具有 app=bubble-chat 标签的 Pod，与 Deployment 的 selector 匹配
      app: bubble-chat