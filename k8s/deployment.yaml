# Kubernetes API 版本定义
apiVersion: apps/v1
# 资源类型：Deployment - 用于部署和管理 Pod 副本集
kind: Deployment
# 元数据定义
metadata:
  # Deployment 名称，在命名空间内唯一标识此部署
  name: bubble-chat
  # 所属命名空间
  namespace: default
  # 标签，用于标识和选择此部署
  labels:
    app: bubble-chat
# Deployment 的规格定义
spec:
  # 副本数量：指定要运行的 Pod 实例数
  replicas: 3
  # 更新策略配置
  strategy:
    # 策略类型：RollingUpdate - 滚动更新，确保零停机
    type: RollingUpdate
    # 滚动更新详细配置
    rollingUpdate:
      # 最大激增 Pod 数：更新期间允许超出期望副本数的最大数量
      maxSurge: 1
      # 最大不可用 Pod 数：更新期间允许不可用的最大 Pod 数量
      maxUnavailable: 0
  # Pod 选择器：定义此 Deployment 管理的 Pod
  selector:
    matchLabels:
      app: bubble-chat
  # Pod 模板：定义创建的 Pod 的规格
  template:
    # Pod 元数据
    metadata:
      # Pod 标签，用于 Service 和 PDB 选择
      labels:
        app: bubble-chat
      # 注解：包含元数据信息
      annotations:
        # 时间戳注解：用于强制触发滚动更新（部署脚本会动态替换）
        timestamp: "{{ TIMESTAMP }}"
    # Pod 规格
    spec:
      # 优雅终止周期：Pod 被标记为终止后，等待容器正常关闭的时间（秒）
      # 提高到 300s，以便在高并发长连接场景下有足够时间进行连接耗尽
      terminationGracePeriodSeconds: 300
      # 容器定义列表
      containers:
      # 主应用容器
      - name: bubble
        # 容器镜像（建议通过环境变量 IMAGE 或 kubectl set image 覆盖）
        image: bubble:latest
        # 镜像拉取策略：如果本地已存在则不拉取
        imagePullPolicy: Never
        # 容器端口配置
        ports:
        - name: http      # 端口名称，用于 Service 引用
          containerPort: 8080  # 容器监听的端口
          protocol: TCP
        - name: metrics   # 监控指标端口名称
          containerPort: 9090  # 监控指标端口
          protocol: TCP
        # 环境变量配置 - 全部从 ConfigMap 读取
        env:
        # 基础配置
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: PORT
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: GIN_MODE
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: ALLOWED_ORIGINS

        # 数据库配置
        - name: DB_DRIVER
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: DB_DRIVER
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: database_dsn

        # JWT / Session 配置
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: jwt_secret
        - name: JWT_ACCESS_MINUTES
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: JWT_ACCESS_MINUTES
        - name: JWT_REFRESH_DAYS
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: JWT_REFRESH_DAYS
        - name: SESSION_COOKIE_NAME
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: SESSION_COOKIE_NAME
        - name: ALLOW_ANON_LOGIN
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: ALLOW_ANON_LOGIN
        - name: REQUIRE_EMAIL_VERIFIED
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: REQUIRE_EMAIL_VERIFIED

        # Redis 配置
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: redis_addr
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: redis_password
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: REDIS_DB

        # Email 配置 - 腾讯云 SES
        - name: EMAIL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: EMAIL_ENABLED
        - name: TENCENT_SECRET_ID
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: tencent_secret_id
        - name: TENCENT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: tencent_secret_key
        - name: TENCENT_SES_REGION
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: TENCENT_SES_REGION
        - name: TENCENT_TEMPLATE_ID
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: TENCENT_TEMPLATE_ID
        - name: EMAIL_FROM
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: EMAIL_FROM
        - name: EMAIL_FROM_NAME
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: EMAIL_FROM_NAME
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: FRONTEND_URL

        # MinIO 配置
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: MINIO_ENDPOINT
        - name: MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: minio_access_key_id
        - name: MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: minio_secret_access_key
        - name: MINIO_USE_SSL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: MINIO_USE_SSL
        - name: MINIO_BUCKET
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: MINIO_BUCKET
        - name: MINIO_BUCKETS
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: MINIO_BUCKETS

        # 阿里云短信服务配置（如果启用短信功能）
        - name: SMS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: SMS_ENABLED
        - name: ALIYUN_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: aliyun_access_key_id
        - name: ALIYUN_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: aliyun_access_secret

        # ffmpeg 服务配置
        - name: FFMPEG_URL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: FFMPEG_URL
       
        # LiveKit 配置
        - name: LIVEKIT_URL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: LIVEKIT_URL
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: livekit_api_key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: bubble-secrets
              key: livekit_api_secret

        # 日志配置
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: LOG_LEVEL
        - name: LOG_JSON
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: LOG_JSON
        - name: LOG_ENABLE_LOKI
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: LOG_ENABLE_LOKI
        - name: LOKI_URL
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: LOKI_URL
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: APP_NAME
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: bubble-config
              key: ENVIRONMENT
        
        # 资源请求和限制
        resources:
          # 请求资源：调度器保证的最小资源
          requests:
            memory: "256Mi"
            cpu: "100m"
          # 资源限制：容器最大可用资源
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # 存活探针：检查容器是否正常运行
        livenessProbe:
          httpGet:
            path: /health/live  # 存活检查端点
            port: http
          initialDelaySeconds: 60  # 容器启动后等待时间
          periodSeconds: 10        # 检查频率
          timeoutSeconds: 5        # 检查超时时间
          failureThreshold: 5      # 连续失败次数后重启容器
        
        # 就绪探针：检查容器是否准备好接收流量
        readinessProbe:
          httpGet:
            path: /health/ready    # 就绪检查端点（连接感知）
            port: http
          initialDelaySeconds: 60   # 容器启动后等待时间
          periodSeconds: 5         # 快速检查频率（连接状态敏感）
          timeoutSeconds: 5        # 检查超时时间
          failureThreshold: 3      # 一次失败即标记为不可用
          successThreshold: 3      # 一次成功即标记为可用
        
        # 生命周期钩子
        lifecycle:
          # 预停止钩子：容器终止前执行
          # 改进流程：先触发应用进入 draining（通过 internal/drain 或切换 readiness），
          # 然后轮询 /health/connections 等待现有连接耗尽或超时。
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                echo "PreStop: trigger draining and wait for connections to drain..."
                # 触发应用进入 draining（如果应用提供此内部接口）
                # 接口失败时继续（避免阻塞删除流程）
                curl -sS -X POST http://localhost:8080/internal/drain || true

                # 给应用一点时间将自身标记为 NotReady（endpoint 变化或内部状态）
                sleep 1

                MAX_WAIT=280  # 要小于 terminationGracePeriodSeconds 保留余量
                WAITED=0
                while [ $WAITED -lt $MAX_WAIT ]; do
                  if command -v jq >/dev/null 2>&1; then
                    CONNS=$(curl -s http://localhost:8080/health/connections | jq -r '.totalConnections // 0')
                  else
                    CONNS=$(curl -s http://localhost:8080/health/connections | grep -o '"totalConnections":[0-9]*' | cut -d: -f2 || echo "0")
                  fi
                  if [ "$CONNS" = "0" ] || [ -z "$CONNS" ]; then
                    echo "All connections drained (waited ${WAITED}s)"
                    break
                  fi
                  echo "Active connections: $CONNS, waiting... (${WAITED}s/${MAX_WAIT}s)"
                  sleep 1
                  WAITED=$((WAITED + 1))
                done
                # 给进程最终清理一点时间
                sleep 2
                echo "PreStop hook completed"
        
        # 安全上下文配置
        securityContext:
          # runAsNonRoot: true      # 禁止以 root 用户运行
          # runAsUser: 1000         # 指定运行用户 ID
          # allowPrivilegeEscalation: false  # 禁止权限提升
          readOnlyRootFilesystem: false    # 根文件系统可写
          capabilities:
            drop:
            - ALL  # 移除所有 Linux 能力