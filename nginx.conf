worker_processes auto;
events {
    worker_connections 4096;
}
http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    # certificate
    include /usr/local/nginx/conf/certificate.conf;
    # 压缩
    include /usr/local/nginx/conf/zip.conf;

    # 80 转发到 443
    server {
        listen 80;
        server_name alemonjs.com *.alemonjs.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name alemonjs.com;

        location /testone {
            alias /usr/local/nginx/alemonjs-testone;
            index index.html index.htm;
        }

        location / {
            index index.html index.htm;
            root /usr/local/nginx/alemonjs.dev;
        }
    }

    server {
        listen 443 ssl http2;
        server_name bubble.alemonjs.com;

        location /bubble.dev/ {
            root /usr/local/nginx;
            try_files $uri $uri/ /bubble.dev/index.html;
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable, max-age=31536000";
            }
            location ~ /\.git {
                deny all;
                return 403;
            }
        }

        location = /bubble.dev {
            return 301 $scheme://$host$request_uri/;
        }

        location /api/updates {
            alias /usr/local/nginx/updates/;
            autoindex on; # 可选：开启目录浏览，方便查看文件列表
            autoindex_exact_size off; # 可选：显示友好文件大小
            autoindex_localtime on; # 可选：使用本地时间显示文件时间
        }

        location /api/files/upload {
            proxy_pass http://127.0.0.1:29090/api/files/upload;
            include /usr/local/nginx/conf/proxy-headers.conf;
            client_max_body_size 300M;
        }

        location /api/bot/v1/files/upload {
            proxy_pass http://127.0.0.1:29090/api/bot/v1/files/upload;
            include /usr/local/nginx/conf/proxy-headers.conf;
            client_max_body_size 300M;
        }

        location / {
            proxy_pass http://127.0.0.1:29090;
            include /usr/local/nginx/conf/proxy-headers.conf;
        }
    }

    server {
        listen 443 ssl http2;
        server_name bubble-base.alemonjs.com;

        location /api/files/upload {
            proxy_pass http://127.0.0.1:29091/api/files/upload;
            include /usr/local/nginx/conf/proxy-headers.conf;
            client_max_body_size 300M;
        }

        location /api/bot/v1/files/upload {
            proxy_pass http://127.0.0.1:29091/api/bot/v1/files/upload;
            include /usr/local/nginx/conf/proxy-headers.conf;
            client_max_body_size 300M;
        }

        location / {
            proxy_pass http://127.0.0.1:29091;
            include /usr/local/nginx/conf/proxy-headers.conf;
        }
    }

    server {
        listen 443 ssl http2;
        server_name bubble-logs.alemonjs.com;

        location / {
