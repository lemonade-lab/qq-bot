basePath: /
definitions:
  models.Announcement:
    properties:
      author:
        allOf:
        - $ref: '#/definitions/models.User'
        description: 公告作者
      authorId:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      guildId:
        type: integer
      id:
        type: integer
      title:
        type: string
    type: object
  models.DmMessage:
    properties:
      authorId:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      deletedAt:
        description: 撤回时间，nil表示未撤回
        type: string
      fileMeta:
        items:
          type: integer
        type: array
      id:
        type: integer
      mentions:
        description: '提及列表: [{type, id}]'
        items:
          type: integer
        type: array
      platform:
        description: '消息来源设备: web, mobile, desktop'
        type: string
      replyTo:
        allOf:
        - $ref: '#/definitions/models.DmMessage'
        description: 关联的被回复消息
      replyToId:
        description: 回复的消息ID
        type: integer
      tempId:
        description: 临时消息ID，用于匹配WebSocket消息
        type: string
      threadId:
        type: integer
      type:
        type: string
    type: object
  models.FavoriteMessage:
    properties:
      createdAt:
        type: string
      dmMessage:
        allOf:
        - $ref: '#/definitions/models.DmMessage'
        description: 私聊消息内容
      dmMessageId:
        description: 私聊消息ID
        type: integer
      id:
        type: integer
      message:
        allOf:
        - $ref: '#/definitions/models.Message'
        description: 扩展字段（不存储在数据库，仅用于API响应）
      messageId:
        description: 频道消息ID
        type: integer
      messageType:
        description: '"channel" or "dm"'
        type: string
      userId:
        description: 收藏者
        type: integer
    type: object
  models.ForumPost:
    properties:
      author:
        allOf:
        - $ref: '#/definitions/models.User'
        description: 作者信息
      authorId:
        description: 作者ID
        type: integer
      channelId:
        description: 所属频道
        type: integer
      content:
        description: 帖子内容（Markdown）
        type: string
      createdAt:
        description: 创建时间
        type: string
      deletedAt:
        description: 软删除
        type: string
      id:
        type: integer
      isLocked:
        description: 是否锁定（禁止回复）
        type: boolean
      isPinned:
        description: 是否置顶
        type: boolean
      replyCount:
        description: 回复数量
        type: integer
      title:
        description: 帖子标题
        type: string
      updatedAt:
        description: 更新时间
        type: string
      viewCount:
        description: 浏览次数
        type: integer
    type: object
  models.ForumReply:
    properties:
      author:
        allOf:
        - $ref: '#/definitions/models.User'
        description: 回复者信息
      authorId:
        description: 回复者ID
        type: integer
      content:
        description: 回复内容（Markdown）
        type: string
      createdAt:
        description: 创建时间
        type: string
      deletedAt:
        description: 软删除
        type: string
      id:
        type: integer
      postId:
        description: 所属帖子
        type: integer
      replyToId:
        description: 回复的回复ID（支持嵌套回复）
        type: integer
      updatedAt:
        description: 更新时间
        type: string
    type: object
  models.Guild:
    properties:
      autoJoinMode:
        description: |-
          AutoJoinMode 控制用户通过 "点加" 是否能直接加入服务器。
          值域: require_approval | no_approval | no_approval_under_100
          默认: require_approval
        type: string
      avatar:
        description: 服务器头像文件路径(MinIO object name)
        type: string
      createdAt:
        type: string
      deletedAt:
        type: string
      description:
        description: 服务器简介
        type: string
      id:
        type: integer
      isPrivate:
        description: 私密服务器，默认私密，无法被搜索
        type: boolean
      name:
        type: string
      ownerId:
        type: integer
    type: object
  models.GuildJoinRequest:
    properties:
      createdAt:
        type: string
      guildId:
        type: integer
      handledAt:
        type: string
      handledBy:
        type: integer
      id:
        type: integer
      note:
        type: string
      status:
        description: pending|approved|rejected
        type: string
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: 用户信息，不存储在数据库中
      userId:
        type: integer
    type: object
  models.Message:
    properties:
      author:
        type: string
      authorId:
        type: integer
      channelId:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      deletedAt:
        description: 撤回时间，nil表示未撤回
        type: string
      fileMeta:
        items:
          type: integer
        type: array
      id:
        type: integer
      mentions:
        description: '提及列表: [{type, id, name?, avatar?}]'
        items:
          type: integer
        type: array
      platform:
        description: '消息来源设备: web, mobile, desktop'
        type: string
      replyTo:
        allOf:
        - $ref: '#/definitions/models.Message'
        description: 关联的被回复消息
      replyToId:
        description: 回复的消息ID
        type: integer
      tempId:
        description: 临时消息ID，用于匹配WebSocket消息
        type: string
      type:
        type: string
    type: object
  models.PinnedMessage:
    properties:
      channelId:
        description: 频道消息时使用
        type: integer
      createdAt:
        type: string
      guildId:
        description: 频道消息时使用
        type: integer
      id:
        type: integer
      messageId:
        type: integer
      pinnedBy:
        description: 谁PIN的
        type: integer
      threadId:
        description: 私聊消息时使用
        type: integer
    type: object
  models.Role:
    properties:
      createdAt:
        type: string
      guildId:
        type: integer
      id:
        type: integer
      name:
        type: string
      permissions:
        type: integer
    type: object
  models.User:
    properties:
      avatar:
        description: 头像文件路径(MinIO object name)
        type: string
      banner:
        description: 横幅背景图片路径(MinIO object name)
        type: string
      bannerColor:
        description: '横幅背景颜色(如 #5865F2)'
        type: string
      bio:
        description: 个人简介
        type: string
      createdAt:
        type: string
      email:
        type: string
      emailVerified:
        type: boolean
      id:
        type: integer
      isBot:
        description: 机器人账号标记
        type: boolean
      isPrivate:
        description: 私密账号，默认公开
        type: boolean
      name:
        type: string
      nickname:
        description: 扩展字段（不存储在数据库，仅用于API响应）
        type: string
      status:
        type: string
      token:
        type: string
    type: object
  service.PermissionInfo:
    properties:
      bit:
        type: integer
      description:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  description: Simple chat server (Gin + Gorm)
  title: Bubble Chat API
  version: 0.1.0
paths:
  /api/announcements/{id}:
    delete:
      consumes:
      - application/json
      description: 删除公告（需要管理员权限）
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: integer
      - description: Guild ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 公告不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Delete announcement
      tags:
      - announcements
      - announcements
    get:
      consumes:
      - application/json
      description: 获取公告详情
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: integer
      - description: Guild ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Announcement'
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 公告不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Get announcement
      tags:
      - announcements
      - announcements
  /api/applications:
    post:
      consumes:
      - application/json
      parameters:
      - description: Application payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create application (friend or guild join)
      tags:
      - me
  /api/applications/{id}:
    put:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      - description: approved or rejected
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "204":
          description: no content
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Approve/Reject application
      tags:
      - me
  /api/blacklist:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: List blacklist
      tags:
      - blacklist
    post:
      consumes:
      - application/json
      parameters:
      - description: User to block
        in: body
        name: body
        required: true
        schema:
          properties:
            userId:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Add to blacklist
      tags:
      - blacklist
  /api/blacklist/{userId}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Remove from blacklist
      tags:
      - blacklist
  /api/bot/v1/pub/hot:
    get:
      parameters:
      - description: Limit (1-50, 默认20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List hot robots (by creation time)
      tags:
      - robot-public
  /api/bot/v1/pub/search:
    get:
      parameters:
      - description: 搜索关键词 (>=1 字符)
        in: query
        name: q
        required: true
        type: string
      - description: Limit (默认20, 最大100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search robots by name
      tags:
      - robot-public
  /api/channels:
    get:
      consumes:
      - application/json
      description: 列出某服务器的全部频道（用户需具备查看权限）
      parameters:
      - description: Guild ID
        in: query
        name: guildId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List channels
      tags:
      - channels
    post:
      consumes:
      - application/json
      description: 创建频道
      parameters:
      - description: '{guildId,name,type,parentId,categoryId}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create channel
      tags:
      - channels
  /api/channels/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除频道及其子频道（需要 PermManageChannels 权限）
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: no content
          schema:
            type: string
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 频道不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete channel (soft delete)
      tags:
      - channels
  /api/channels/{id}/category:
    put:
      consumes:
      - application/json
      description: 设置频道所属分类
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: '{categoryId?: number|null}'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 频道不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set channel category
      tags:
      - channels
  /api/channels/{id}/livekit-token:
    get:
      consumes:
      - application/json
      description: 获取 LiveKit 房间 Token
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未认证
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 权限不足
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 频道不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: LiveKit未配置
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get LiveKit token for channel
      tags:
      - channels
  /api/channels/{id}/participants:
    get:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get channel participants
      tags:
      - channels
  /api/channels/{id}/pins:
    get:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PinnedMessage'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List pinned messages
      tags:
      - pins
    post:
      consumes:
      - application/json
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: '{messageId}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PinnedMessage'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Pin message
      tags:
      - pins
  /api/channels/{id}/pins/{messageId}:
    delete:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: Message ID
        in: path
        name: messageId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Unpin message
      tags:
      - pins
  /api/channels/{id}/posts:
    get:
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: Limit (default 20)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: 'Sort by: latest, oldest, popular (default latest)'
        in: query
        name: sortBy
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ForumPost'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List forum posts
      tags:
      - forum
    post:
      consumes:
      - application/json
      parameters:
      - description: Channel ID
        in: path
        name: id
        required: true
        type: integer
      - description: '{title, content}'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ForumPost'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
